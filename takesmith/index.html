<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0c10">
<title>TakeSmith — AI Takes for Sports Creators</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,600;0,700;0,900;1,900&display=swap');

  :root {
    --bg: #0a0c10;
    --bg2: #10131a;
    --card: #151923;
    --card2: #1b2130;
    --line: #262e40;
    --text: #f2f5fa;
    --muted: #8b94a7;
    --accent: #ccff00;
    --accent-dim: #a3cc00;
    --hot: #ff5c1f;
    --danger: #ff4d5e;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Archivo', system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 16px;
    line-height: 1.5;
    overscroll-behavior-y: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(600px 300px at 85% -5%, rgba(204,255,0,.07), transparent 70%),
      radial-gradient(500px 260px at 0% 100%, rgba(255,92,31,.05), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    min-height: 100dvh;
    padding: 0 16px calc(84px + env(safe-area-inset-bottom));
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0 6px;
    position: sticky;
    top: 0;
    background: linear-gradient(var(--bg) 78%, transparent);
    z-index: 20;
  }

  .wordmark {
    font-weight: 900;
    font-style: italic;
    font-size: 24px;
    letter-spacing: -0.5px;
    text-transform: uppercase;
    user-select: none;
  }
  .wordmark em { font-style: italic; color: var(--accent); }
  .wordmark .bolt { color: var(--accent); margin-right: 2px; }

  .header-actions { display: flex; gap: 8px; align-items: center; }

  .pill {
    font-size: 12px;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
  }
  .pill.pro-badge { border-color: var(--accent); color: var(--accent); }

  .icon-btn {
    width: 36px; height: 36px;
    display: grid; place-items: center;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
  }

  /* ---------- Sections ---------- */
  .view { display: none; animation: fadeUp .25s ease; }
  .view.active { display: block; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  h2.section {
    font-size: 13px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.6px;
    color: var(--muted);
    margin: 22px 0 10px;
  }
  h2.section .step {
    color: var(--accent);
    margin-right: 6px;
  }

  /* ---------- Sport picker ---------- */
  .sport-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .sport-card {
    position: relative;
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color .15s, transform .1s;
  }
  .sport-card:active { transform: scale(.97); }
  .sport-card .emoji { font-size: 24px; }
  .sport-card .name { font-weight: 800; font-size: 15px; }
  .sport-card.selected {
    border-color: var(--accent);
    background: linear-gradient(160deg, rgba(204,255,0,.12), var(--card) 60%);
  }
  .sport-card .lock {
    position: absolute;
    top: 8px; right: 10px;
    font-size: 12px;
    color: var(--muted);
  }

  /* ---------- Content types ---------- */
  .type-list { display: flex; flex-direction: column; gap: 8px; }

  .type-card {
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color .15s, transform .1s;
  }
  .type-card:active { transform: scale(.98); }
  .type-card.selected {
    border-color: var(--accent);
    background: linear-gradient(160deg, rgba(204,255,0,.12), var(--card) 55%);
  }
  .type-card .t-icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: var(--card2);
    display: grid; place-items: center;
    font-size: 19px;
    flex-shrink: 0;
  }
  .type-card .t-name { font-weight: 800; font-size: 15px; }
  .type-card .t-desc { font-size: 12.5px; color: var(--muted); line-height: 1.35; }

  /* ---------- Topic input ---------- */
  .topic-wrap { position: relative; }
  input[type="text"], input[type="password"] {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--text);
    font: inherit;
    padding: 14px;
    outline: none;
  }
  input[type="text"]:focus, input[type="password"]:focus { border-color: var(--accent-dim); }
  input::placeholder { color: #5a6376; }

  /* ---------- Spice slider ---------- */
  .spice-box {
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 16px 12px;
  }
  .spice-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    margin-top: 10px;
  }
  .spice-labels span { width: 33%; }
  .spice-labels span:nth-child(2) { text-align: center; }
  .spice-labels span:last-child { text-align: right; }
  .spice-labels span.on { color: var(--text); }

  .spice-current {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .spice-current .lvl { font-weight: 900; font-size: 18px; text-transform: uppercase; font-style: italic; }
  .spice-current .hint { font-size: 12px; color: var(--muted); text-align: right; max-width: 60%; }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 8px;
    border-radius: 99px;
    background: linear-gradient(90deg, #4d7c0f, var(--accent) 50%, var(--hot));
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--text);
    border: 4px solid var(--bg);
    box-shadow: 0 0 0 1.5px var(--line), 0 2px 8px rgba(0,0,0,.5);
  }
  input[type="range"]::-moz-range-thumb {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--text);
    border: 4px solid var(--bg);
    box-shadow: 0 0 0 1.5px var(--line);
  }

  /* ---------- Buttons ---------- */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font: inherit;
    font-weight: 800;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--text);
    padding: 13px 16px;
    cursor: pointer;
    transition: transform .1s, opacity .15s;
    user-select: none;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .45; cursor: not-allowed; }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    border-color: var(--accent);
    color: #0c0f05;
    font-size: 17px;
    font-style: italic;
    text-transform: uppercase;
    letter-spacing: .5px;
    padding: 16px;
    box-shadow: 0 6px 24px rgba(204,255,0,.22);
  }

  .btn-ghost { background: transparent; }
  .btn-sm { padding: 9px 12px; font-size: 13.5px; border-radius: 12px; }

  .gen-meta {
    text-align: center;
    font-size: 12.5px;
    color: var(--muted);
    margin-top: 10px;
  }
  .gen-meta b { color: var(--accent); }

  /* ---------- Output ---------- */
  .output-card {
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: var(--radius);
    margin-top: 14px;
    overflow: hidden;
  }
  .output-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 12px 14px;
    background: var(--card2);
    border-bottom: 1px solid var(--line);
  }
  .output-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .6px;
    padding: 4px 8px;
    border-radius: 8px;
    background: rgba(204,255,0,.12);
    color: var(--accent);
  }
  .tag.dim { background: rgba(139,148,167,.15); color: var(--muted); }
  .tag.hot { background: rgba(255,92,31,.16); color: var(--hot); }

  .output-body {
    padding: 16px 16px 6px;
    white-space: pre-wrap;
    font-size: 15.5px;
    line-height: 1.62;
  }
  .cue { color: var(--accent); font-weight: 800; }

  .output-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 14px;
  }
  .output-actions .full { grid-column: 1 / -1; }

  .save-btn.saved { border-color: var(--accent); color: var(--accent); }

  .demo-note {
    font-size: 12px;
    color: var(--muted);
    padding: 0 16px 12px;
  }
  .demo-note a { color: var(--accent); cursor: pointer; text-decoration: underline; }

  /* ---------- Skeleton loading ---------- */
  .skeleton { padding: 18px 16px; }
  .skel-line {
    height: 13px;
    border-radius: 6px;
    background: linear-gradient(90deg, var(--card2) 25%, #232a3c 50%, var(--card2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.1s infinite linear;
    margin-bottom: 12px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ---------- Library ---------- */
  .lib-empty {
    text-align: center;
    padding: 64px 24px;
    color: var(--muted);
  }
  .lib-empty .big { font-size: 44px; margin-bottom: 12px; }
  .lib-empty b { color: var(--text); display: block; font-size: 17px; margin-bottom: 6px; }

  .lib-card {
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .lib-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    cursor: pointer;
  }
  .lib-date { font-size: 11.5px; color: var(--muted); white-space: nowrap; }
  .lib-body {
    display: none;
    padding: 0 14px;
    white-space: pre-wrap;
    font-size: 14.5px;
    line-height: 1.6;
    color: #d7dce6;
  }
  .lib-card.open .lib-body { display: block; }
  .lib-preview {
    padding: 0 14px 12px;
    font-size: 13.5px;
    color: var(--muted);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .lib-card.open .lib-preview { display: none; }
  .lib-actions { display: flex; gap: 8px; padding: 12px 14px; }
  .lib-cap { font-size: 12.5px; color: var(--muted); text-align: center; margin: 14px 0; }
  .lib-cap a { color: var(--accent); cursor: pointer; }

  /* ---------- Paywall ---------- */
  .paywall { text-align: center; padding-top: 26px; }
  .paywall .crown { font-size: 52px; }
  .paywall h1 {
    font-size: 30px;
    font-weight: 900;
    font-style: italic;
    text-transform: uppercase;
    margin: 10px 0 4px;
  }
  .paywall h1 em { color: var(--accent); font-style: italic; }
  .paywall .sub { color: var(--muted); font-size: 14.5px; max-width: 320px; margin: 0 auto 22px; }

  .perk-list {
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 22px;
  }
  .perk {
    display: flex;
    gap: 12px;
    align-items: center;
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: var(--radius);
    padding: 13px 14px;
  }
  .perk .p-icon { font-size: 20px; }
  .perk .p-name { font-weight: 800; font-size: 14.5px; }
  .perk .p-desc { font-size: 12.5px; color: var(--muted); }

  .price-line { margin: 4px 0 14px; }
  .price-line .price { font-size: 34px; font-weight: 900; font-style: italic; }
  .price-line .per { color: var(--muted); font-size: 14px; }

  .paywall-note { font-size: 12px; color: var(--muted); margin-top: 12px; }

  /* ---------- Tab bar ---------- */
  nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 30;
    background: rgba(13,16,22,.92);
    backdrop-filter: blur(14px);
    border-top: 1px solid var(--line);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-inner {
    max-width: 520px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
  }
  .nav-btn {
    background: none;
    border: none;
    color: var(--muted);
    font: inherit;
    font-size: 11px;
    font-weight: 700;
    padding: 10px 0 12px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .nav-btn .n-icon { font-size: 21px; line-height: 1; }
  .nav-btn.active { color: var(--accent); }

  /* ---------- Modal ---------- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(4,6,10,.7);
    backdrop-filter: blur(4px);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 50;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    width: 100%;
    max-width: 520px;
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: 22px 22px 0 0;
    padding: 22px 18px calc(22px + env(safe-area-inset-bottom));
    animation: slideUp .22s ease;
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal h3 { font-size: 19px; font-weight: 900; margin-bottom: 4px; }
  .modal .m-sub { color: var(--muted); font-size: 13.5px; margin-bottom: 16px; }
  .modal label { display: block; font-size: 12.5px; font-weight: 700; color: var(--muted); margin: 14px 0 6px; }
  .modal .row { display: flex; gap: 8px; margin-top: 18px; }
  .modal .row .btn { flex: 1; }

  /* ---------- Toast ---------- */
  #toast {
    position: fixed;
    left: 50%;
    bottom: calc(96px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: #0c0f14;
    font-weight: 800;
    font-size: 14px;
    padding: 11px 18px;
    border-radius: 99px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    z-index: 60;
    white-space: nowrap;
    box-shadow: 0 8px 30px rgba(0,0,0,.5);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (min-width: 640px) {
    body { padding-top: 12px; }
    .sport-grid { grid-template-columns: repeat(4, 1fr); }
    .sport-card { flex-direction: column; text-align: center; gap: 6px; padding: 16px 8px; }
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="wordmark"><span class="bolt">⚡</span>Take<em>Smith</em></div>
    <div class="header-actions">
      <button class="pill" id="planPill" onclick="TS.go('pro')">FREE</button>
      <button class="icon-btn" onclick="TS.openSettings()" aria-label="Settings">⚙︎</button>
    </div>
  </header>

  <!-- ============ CREATE VIEW ============ -->
  <section class="view active" id="view-create">

    <h2 class="section"><span class="step">01</span>Pick your sport</h2>
    <div class="sport-grid" id="sportGrid"></div>

    <h2 class="section"><span class="step">02</span>Pick your format</h2>
    <div class="type-list" id="typeList"></div>

    <h2 class="section"><span class="step">03</span>Topic <span style="color:#5a6376;font-weight:600;text-transform:none;letter-spacing:0">(optional)</span></h2>
    <div class="topic-wrap">
      <input type="text" id="topicInput" maxlength="120"
        placeholder="e.g. Premier League strikers, Attitude Era vs today…">
    </div>

    <h2 class="section"><span class="step">04</span>Spice level</h2>
    <div class="spice-box">
      <div class="spice-current">
        <span class="lvl" id="spiceName">Medium 🌶️🌶️</span>
        <span class="hint" id="spiceHint">Bold. Takes a clear side.</span>
      </div>
      <input type="range" id="spiceSlider" min="0" max="2" step="1" value="1">
      <div class="spice-labels" id="spiceLabels">
        <span>MILD</span><span class="on">MEDIUM</span><span>NUCLEAR</span>
      </div>
    </div>

    <div style="margin-top:22px">
      <button class="btn btn-primary" id="generateBtn" onclick="TS.generate('new')">⚡ Forge my take</button>
      <div class="gen-meta" id="genMeta"></div>
    </div>

    <div id="outputArea"></div>
  </section>

  <!-- ============ LIBRARY VIEW ============ -->
  <section class="view" id="view-library">
    <h2 class="section" style="margin-top:16px">🔖 Your library</h2>
    <div id="libraryList"></div>
  </section>

  <!-- ============ PRO / PAYWALL VIEW ============ -->
  <section class="view" id="view-pro">
    <div class="paywall" id="paywallContent"></div>
  </section>

</div>

<!-- ============ TAB BAR ============ -->
<nav>
  <div class="nav-inner">
    <button class="nav-btn active" data-view="create" onclick="TS.go('create')">
      <span class="n-icon">⚡</span>Create
    </button>
    <button class="nav-btn" data-view="library" onclick="TS.go('library')">
      <span class="n-icon">🔖</span>Library
    </button>
    <button class="nav-btn" data-view="pro" onclick="TS.go('pro')">
      <span class="n-icon">👑</span>Pro
    </button>
  </div>
</nav>

<!-- ============ SETTINGS MODAL ============ -->
<div class="modal-overlay" id="settingsOverlay" onclick="if(event.target===this)TS.closeSettings()">
  <div class="modal">
    <h3>Settings</h3>
    <p class="m-sub">TakeSmith runs in demo mode out of the box. Add a Claude API key to generate real AI takes.</p>

    <label for="apiKeyInput">Claude API key <span style="font-weight:400">(stored only on this device)</span></label>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-…" autocomplete="off">

    <div class="row">
      <button class="btn" onclick="TS.saveSettings()">Save</button>
      <button class="btn btn-ghost" onclick="TS.closeSettings()">Close</button>
    </div>

    <div class="row" id="dangerRow">
      <button class="btn btn-sm btn-ghost" style="color:var(--muted)" onclick="TS.downgrade()" id="downgradeBtn">Leave Pro preview</button>
      <button class="btn btn-sm btn-ghost" style="color:var(--danger)" onclick="TS.resetAll()">Reset app data</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

/* =====================================================================
   TakeSmith — AI content engine for sports creators
   Single-file SPA. State lives in localStorage. Generation runs through
   the Claude API when a key is set, otherwise a built-in demo writer.
   ===================================================================== */

const FREE_DAILY_LIMIT = 3;
const FREE_LIBRARY_CAP = 5;
const CLAUDE_MODEL = 'claude-sonnet-5';

/* ---------------- Config: sports ---------------- */
const SPORTS = [
  { id: 'football', name: 'Football', emoji: '⚽', pro: false },
  { id: 'nba',      name: 'NBA',      emoji: '🏀', pro: false },
  { id: 'wwe',      name: 'WWE',      emoji: '🤼', pro: true  },
  { id: 'ufc',      name: 'UFC / MMA', emoji: '🥊', pro: true  },
];

/* ---------------- Config: content types ---------------- */
const TYPES = [
  { id: 'hottake',  name: 'Hot Take',           icon: '🔥', desc: 'A bold, debatable opinion with 3 supporting arguments.' },
  { id: 'debate',   name: 'Debate Script',       icon: '🎬', desc: 'A 60-second two-sided argument script for short-form video.' },
  { id: 'tierlist', name: 'Tier List',           icon: '🏆', desc: 'A ranked S-to-F tier list on your chosen topic.' },
  { id: 'unpop',    name: 'Unpopular Opinion',   icon: '🙅', desc: 'A contrarian take with the reasoning to back it up.' },
  { id: 'matchday', name: 'Matchday Reaction',   icon: '📣', desc: 'Talking points for an upcoming or recent event.' },
];

const SPICE = [
  { name: 'Mild 🌶️',        hint: 'Confident but fair. Defensible on any podcast.' },
  { name: 'Medium 🌶️🌶️',    hint: 'Bold. Takes a clear side.' },
  { name: 'Nuclear ☢️',      hint: 'Starts wars in the comments. No mercy.' },
];

/* ---------------- Storage helpers ---------------- */
const store = {
  get(k, fallback) {
    try { const v = localStorage.getItem('ts_' + k); return v === null ? fallback : JSON.parse(v); }
    catch { return fallback; }
  },
  set(k, v) { try { localStorage.setItem('ts_' + k, JSON.stringify(v)); } catch {} },
  del(k) { try { localStorage.removeItem('ts_' + k); } catch {} },
};

/* ---------------- App state ---------------- */
const state = {
  sport: store.get('sport', 'football'),
  type: store.get('type', 'hottake'),

function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function usedToday() {
  const u = store.get('usage', null);
  return (u && u.date === todayKey()) ? u.count : 0;
}
function bumpUsage() {
  store.set('usage', { date: todayKey(), count: usedToday() + 1 });
}
function gensLeft() {
  return Math.max(0, FREE_DAILY_LIMIT - usedToday());
}

const shuffle = (arr) => { const a = arr.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };
const esc = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

let toastTimer = null;
function toast(msg) {

}

function topicLine(topic) {

function demoHotTake(r, topic, spice) {
  const [a, b] = shuffle(r.stars);
  const claims = [
    `${a} is quietly the most valuable ${r.role} in ${r.arena} right now.`,
    `${a} is better than ${b} right now, and it isn't close.`,
    `${a} would embarrass ${b} in any era. And everyone pretending otherwise is lying to you.`,
  ];
  const args = shuffle(ARG_POOL).slice(0, 3);
  return {
    meta: { subject: a, rival: b },
    text: [
      'HOT TAKE:',
      topicLine(topic),
      claims[spice],
      '',
      "Here's why.",
      '',
      `One. ${args[0]}`,
      '',
      `Two. ${args[1]}`,
      '',
      `Three. ${args[2]}`,
      '',
      pick(CLOSERS[spice]),
    ].filter(l => l !== null).join('\n'),
  };
}

function demoDebate(r, topic, spice) {
  const [a, b] = shuffle(r.stars);
  const q = topic
    ? `${topic} — who actually wins this argument?`

  const heat = [
    ['There is a real case here.', 'But hold on. The other side has a point too.'],
    ['One side of this is just wrong.', 'But the comments will fight me on this. So let them cook.'],
    ['One of these answers is a war crime.', 'And the other side? Delusional. But let them talk.'],

      `[0:08] SIDE A — the case for ${a}.`,
      heat[0],
      pick(ARG_POOL),
      pick(ARG_POOL),
      '',
      `[0:32] SIDE B — the case for ${b}.`,
      heat[1],
      pick(ARG_POOL),
      pick(ARG_POOL),
      '',
      '[0:52] VERDICT.',

/* =====================================================================

   ===================================================================== */
const SYSTEM_PROMPT = `You are TakeSmith, a ghostwriter for sports content creators who film short-form video on their phones.

Rules for every output:
- Spoken-word style. Short sentences. Punchy. Written to be read aloud on camera.
- No hashtags. No emojis. No markdown formatting symbols like # or *.
- Simple ALL-CAPS labels (like "HOT TAKE:" or "S TIER —") are allowed.
- Stay on sports. Be provocative about performance and legacy, never personal abuse, slurs, or off-field tragedy.
- Keep it under 220 words unless the format requires structure.
- Output ONLY the script. No preamble, no explanation.`;

const SPICE_PROMPT = [
  'Spice level: MILD. Confident but fair and defensible. A take a thoughtful pundit would stand behind.',
  'Spice level: MEDIUM. Bold. Take a clear side. Ruffle feathers. No fence-sitting.',
  'Spice level: NUCLEAR. Maximum boldness. A take engineered to start arguments in the comments. Still strictly about sport — no personal abuse.',
];

function buildPrompt(kind) {
  const sport = SPORTS.find(s => s.id === state.sport).name;
  const topic = $('topicInput').value.trim();
  const topicLine = topic ? `Topic focus: "${topic}".` : 'No specific topic given — pick something current and debate-worthy in this sport.';

  if (kind === 'counter' && state.lastOutput) {
    return `Sport: ${sport}. ${SPICE_PROMPT[state.spice]}

I just delivered this take on camera:
---
${state.lastOutput.text}
---
Now write me "THE COUNTER:" — a script arguing the OTHER side of that exact take, same energy, same spoken-word style, so I can film the rebuttal.`;
  }

  const asks = {
    hottake: `Write a HOT TAKE: one bold, debatable opinion, then exactly three supporting arguments labelled "One.", "Two.", "Three.", then a one-line sign-off that invites comments.`,
    debate: `Write a 60-second DEBATE SCRIPT for short-form video with timestamp cues: [0:00] HOOK (one-line question), [0:08] SIDE A (2-3 punchy lines), [0:32] SIDE B (2-3 punchy lines), [0:52] VERDICT (pick a side or throw it to the comments).`,
    tierlist: `Write a TIER LIST script ranking five real, relevant names into S, A, B, C and F tiers. Format each as "S TIER — Name." on one line then a one-line justification. Open with a one-line title, close with a sign-off that invites debate.`,
    unpop: `Write an UNPOPULAR OPINION: one contrarian take, then the reasoning in 2-3 short beats, then a pre-emptive line answering the obvious objection, then a sign-off.`,
    matchday: `Write a MATCHDAY REACTION: five rapid-fire talking points (labelled One. to Five.) for an upcoming or recent event, ending with a question to throw to the audience.`,
  };

  return `Sport: ${sport}. ${topicLine} ${SPICE_PROMPT[state.spice]}

${asks[state.type]}`;
}

async function claudeGenerate(kind) {
  const key = store.get('apikey', '');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: CLAUDE_MODEL,
      max_tokens: 700,
      system: SYSTEM_PROMPT,
      messages: [{ role: 'user', content: buildPrompt(kind) }],
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error((err.error && err.error.message) || ('API error ' + res.status));
  }
  const data = await res.json();
  const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
  if (!text) throw new Error('Empty response from API');
  return { meta: {}, text };
}

/* =====================================================================
   GENERATION FLOW
   ===================================================================== */
async function generate(kind) {
  if (state.busy) return;

  const sport = SPORTS.find(s => s.id === state.sport);
  if (sport.pro && !isPro()) { TS.go('pro'); return; }
  if (!isPro() && gensLeft() <= 0) {
    toast('Daily limit reached');
    TS.go('pro');
    return;
  }

  state.busy = true;
  renderGenerateBtn();
  renderSkeleton();

  try {
    const hasKey = !!store.get('apikey', '');
    const result = hasKey ? await claudeGenerate(kind) : demoGenerate(kind);
    // Demo mode: tiny delay so generation feels like work is happening
    if (!hasKey) await new Promise(r => setTimeout(r, 650 + Math.random() * 500));

    state.lastOutput = {
      id: 'tk_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
      sport: state.sport,
      type: kind === 'counter' ? 'counter' : state.type,
      topic: $('topicInput').value.trim(),
      spice: state.spice,
      text: result.text,
      meta: result.meta || {},
      demo: !hasKey,
    };
    bumpUsage();
    renderOutput();
  } catch (e) {
    $('outputArea').innerHTML = '';
    toast('⚠️ ' + (e.message || 'Generation failed'));
  } finally {
    state.busy = false;
    renderGenerateBtn();
    renderMeta();
    renderPlanPill();
  }
}

    <div class="perk-list">
      <div class="perk"><span class="p-icon">♾️</span><div><div class="p-name">Unlimited generations</div><div class="p-desc">No daily cap. Regenerate until it slaps.</div></div></div>
      <div class="perk"><span class="p-icon">🥊</span><div><div class="p-name">All four sports</div><div class="p-desc">Unlocks WWE and UFC/MMA modes.</div></div></div>
      <div class="perk"><span class="p-icon">🔖</span><div><div class="p-name">Unlimited library</div><div class="p-desc">Save every banger. Free tier holds ${FREE_LIBRARY_CAP}.</div></div></div>
      <div class="perk"><span class="p-icon">☢️</span><div><div class="p-name">Nuclear-grade spice</div><div class="p-desc">Priority access to the boldest take engine.</div></div></div>
    </div>
    <div class="price-line"><span class="price">£6.99</span><span class="per"> / month</span></div>
    <button class="btn btn-primary" onclick="TS.upgrade()">👑 Unlock Pro preview</button>
    <p class="paywall-note">Payments aren't live yet — this button unlocks a free preview of Pro on this device.</p>
  `;
}

/* =====================================================================
   ACTIONS (public API bound to the DOM)
   ===================================================================== */
const TS = {
  go(view) {
    state.view = view;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    $('view-' + view).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
    if (view === 'library') renderLibrary();
    if (view === 'pro') renderPaywall();
    window.scrollTo({ top: 0 });
  },

  pickSport(id) {
    const s = SPORTS.find(x => x.id === id);
    if (s.pro && !isPro()) { toast('🔒 ' + s.name + ' is a Pro sport'); TS.go('pro'); return; }
    state.sport = id;
    store.set('sport', id);
    renderSports();
  },

  pickType(id) {
    state.type = id;
    store.set('type', id);
    renderTypes();
  },

  generate,

  async copyOutput() {
    if (!state.lastOutput) return;
    await copyToClipboard(state.lastOutput.text);
  },

  async copyText(id) {
    const item = store.get('library', []).find(x => x.id === id);
    if (item) await copyToClipboard(item.text);
  },

  saveOutput() {
    const o = state.lastOutput;
    if (!o) return;
    const lib = store.get('library', []);
    if (lib.some(x => x.id === o.id)) { toast('Already saved'); return; }
    if (!isPro() && lib.length >= FREE_LIBRARY_CAP) {
      toast('Library full on free tier');
      TS.go('pro');
      return;
    }
    lib.unshift({ ...o, savedAt: Date.now() });
    store.set('library', lib);
    const btn = $('saveBtn');
    if (btn) { btn.classList.add('saved'); btn.innerHTML = '✔ Saved'; }
    toast('🔖 Saved to library');
  },

  deleteSaved(id) {
    store.set('library', store.get('library', []).filter(x => x.id !== id));
    renderLibrary();
    toast('Deleted');
  },

  toggleLib(id) {
    $('lib-' + id).classList.toggle('open');
  },

  upgrade() {
    store.set('pro', true);
    toast('👑 Pro preview unlocked');
    renderPlanPill();
    renderSports();
    renderMeta();
    renderPaywall();
  },

  downgrade() {
    store.set('pro', false);
    if (SPORTS.find(s => s.id === state.sport).pro) { state.sport = 'football'; store.set('sport', 'football'); }
    toast('Back on the free tier');
    TS.closeSettings();
    renderPlanPill();
    renderSports();
    renderMeta();
    renderPaywall();
  },

  openSettings() {
    $('apiKeyInput').value = store.get('apikey', '');
    renderPlanPill();
    $('settingsOverlay').classList.add('open');
  },

  closeSettings() {
    $('settingsOverlay').classList.remove('open');
  },

  saveSettings() {
    const key = $('apiKeyInput').value.trim();
    if (key) store.set('apikey', key); else store.del('apikey');
    toast(key ? '🔑 API key saved' : 'Demo mode active');
    TS.closeSettings();
  },

  resetAll() {
    if (!confirm('Reset TakeSmith? This clears your library, plan and settings on this device.')) return;
    ['sport', 'type', 'usage', 'library', 'pro', 'apikey'].forEach(k => store.del(k));
    location.reload();
  },
};
window.TS = TS;

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    toast('📋 Copied — go film it');
  } catch {
    // Fallback for older mobile browsers / non-secure contexts
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); toast('📋 Copied — go film it'); }
    catch { toast('Copy failed — long-press to select'); }
    document.body.removeChild(ta);
  }
}

/* ---------------- Init ---------------- */
(function init() {
  // Never boot into a Pro-locked sport on a free account
  if (SPORTS.find(s => s.id === state.sport).pro && !isPro()) state.sport = 'football';
  if (!TYPES.some(t => t.id === state.type)) state.type = 'hottake';

  $('spiceSlider').addEventListener('input', (e) => {
    state.spice = Number(e.target.value);
    renderSpice();
  });

  renderSports();
  renderTypes();
  renderSpice();
  renderMeta();
  renderGenerateBtn();
  renderPlanPill();
})();
</script>
</body>
</html>
